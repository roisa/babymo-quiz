name: Deploy to gh-pages

# Builds the Next.js static export and force-pushes it to the gh-pages branch.
# GitHub Pages serves directly from that branch
# (Settings → Pages → Deploy from a branch → gh-pages → / (root)).
#
# Deliberately minimal: first-party actions only, contents:write only.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # The render script's Playwright browsers aren't needed to build the site.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci

      - name: Build static export
        env:
          # Repo is served from https://<user>.github.io/babymo-quiz/.
          # Leave the default basePath (/babymo-quiz) from next.config.ts.
          NEXT_PUBLIC_BASE_PATH: "/babymo-quiz"
        run: npm run build

      - name: Stamp .nojekyll on output
        run: touch out/.nojekyll

      - name: Force-push out/ to gh-pages
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          cd out
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy $SHA"
          git push --force --quiet "https://x-access-token:${TOKEN}@github.com/${REPO}" gh-pages
